<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARATHON // TACTICAL_OS</title>
    <style>
        :root { --teal: #00d4ff; --pink: #ff79c6; --carbon: #0b0e14; --panel: #161b22; --border: #30363d; --gold: #ffb86c; }
        body { font-family: 'Courier New', monospace; background: var(--carbon); color: #e0e0e0; padding: 10px; text-transform: uppercase; font-size: 11px; }
        .container { max-width: 600px; margin: auto; }
        .nav-tabs { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
        .tab { flex: 1; padding: 10px; text-align: center; background: #000; border: 1px solid var(--border); color: #666; cursor: pointer; min-width: 80px; }
        .tab.active { border-color: var(--teal); color: var(--teal); border-bottom: 2px solid var(--teal); }
        .page { display: none; } .page.active { display: block; }
        .card { background: var(--panel); padding: 15px; border: 1px solid var(--border); margin-bottom: 10px; }
        .label { font-size: 0.6rem; color: var(--pink); font-weight: bold; display: block; margin-bottom: 5px; }
        .val { font-size: 1.4rem; font-weight: bold; color: var(--teal); }
        select, button, input { background: #000; color: var(--teal); border: 1px solid var(--border); padding: 10px; width: 100%; margin-top: 5px; font-family: inherit; box-sizing: border-box; }
        button { background: var(--teal); color: #000; font-weight: bold; cursor: pointer; border: none; }
        .item-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid #222; }
        .loc-tag { color: var(--gold); font-size: 9px; display: block; margin-top: 3px; }
        .obj-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid #222; }
        .completed { text-decoration: line-through; color: #444; }
        .del-btn { background: #333; color: #fff; padding: 0 8px; cursor: pointer; margin-left: 10px; border: 1px solid #555; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-tabs">
        <div class="tab active" onclick="showPage('combat')">TACTICAL_OS</div>
        <div class="tab" onclick="showPage('loot')">LOOT_FINDER</div>
        <div class="tab" onclick="showPage('contracts')">CONTRACTS</div>
    </div>

    <div id="combat" class="page active">
        <div class="card">
            <label class="label">RUNNER_SHELL</label>
            <select id="shell-select">
                <option value="Vandal">VANDAL // AGILITY</option>
                <option value="Triage">TRIAGE // ENERGY</option>
                <option value="Assassin">ASSASSIN // STEALTH</option>
                <option value="Destroyer">DESTROYER // TANK</option>
                <option value="Recon">RECON // INTEL</option>
                <option value="Thief">THIEF // ECONOMY</option>
                <option value="Rook">ROOK // ZERO-RISK</option>
            </select>
            <label class="label" style="margin-top:10px;">PRIMARY_WEAPON</label>
            <select id="weapon-select">
                <option value="WSTR Shotgun">WSTR SHOTGUN</option>
                <option value="BRRT SMG">BRRT SMG</option>
                <option value="Ares Railgun">ARES RAILGUN</option>
            </select>
            <button onclick="runSync()" style="margin-top:15px;">INITIALIZE_SYNC</button>
        </div>
        <div class="card">
            <div id="sync-status" class="val">AWAITING_LINK</div>
            <div id="advice-text" style="color:#8b949e; margin-top:10px; font-size:10px;">Hardware detected. Ready for analysis.</div>
        </div>
    </div>

    <div id="loot" class="page">
        <div class="card">
            <label class="label">HIGH_VALUE_OBJECTS</label>
            <select id="loot-picker" onchange="addLoot()">
                <option value="">-- SELECT TARGET OBJECT --</option>
                <option value="Prestige Key">PRESTIGE KEY (25,000c)</option>
                <option value="Bio-Core">BIO-CORE (22,000c)</option>
                <option value="Anomalous Plasma">ANOMALOUS PLASMA (18,000c)</option>
                <option value="Pangea Kit">PANGEA KIT (15,000c)</option>
                <option value="Memory Shard">MEMORY SHARD (12,000c)</option>
                <option value="Encrypted Data">ENCRYPTED DATA (10,000c)</option>
                <option value="Unstable Core">UNSTABLE CORE (7,000c)</option>
                <option value="Advanced Patch">ADVANCED PATCH (4,500c)</option>
                <option value="Data Card">DATA CARD (2,500c)</option>
            </select>
            <div id="backpack" style="margin-top:15px;"></div>
            <div style="border-top: 2px solid var(--gold); margin-top:10px; padding-top:10px; text-align:right;">
                <span class="label">SESSION_TOTAL</span>
                <div id="total-val" class="val" style="color:var(--gold)">0 C</div>
            </div>
        </div>
    </div>

    <div id="contracts" class="page">
        <div class="card">
            <label class="label">FACTION_MISSION_LOG</label>
            <select id="faction-select" onchange="updateContracts()">
                <option value="CyberAcme">CYBERACME (ECONOMY)</option>
                <option value="NuCaloric">NUCALORIC (SURVIVAL)</option>
                <option value="Traxus">TRAXUS (WEAPONS)</option>
                <option value="Arachne">ARACHNE (PVP)</option>
                <option value="MIDA">MIDA (SABOTAGE)</option>
                <option value="Sekiguchi">SEKIGUCHI (BIOTECH)</option>
            </select>
            <div id="contract-display" style="margin-top:15px;"></div>
        </div>
    </div>
</div>

<script>
    // Full Data Tables
    const weaponTable = {
        "WSTR Shotgun": "Shot", "BRRT SMG": "SMG", "Ares Railgun": "Rail", 
        "Hardline PR": "Prec", "Longshot Sniper": "Snip", "Overrun AR": "AR",
        "V75 Scar": "Ener", "M77 Assault": "AR", "Bully SMG": "SMG",
        "Twin Tap HBR": "Prec", "V22 Volt Thrower": "SMG", "Zeus Rail": "Rail"
    };

    const lootData = {
        "Prestige Key": { v: 25000, l: "High-Security Vaults (Columns/Perimeter)" },
        "Bio-Core": { v: 22000, l: "Sekiguchi Pods (Southern Flight)" },
        "Anomalous Plasma": { v: 18000, l: "Reactor Core (The Core)" },
        "Pangea Kit": { v: 15000, l: "NuCaloric Labs (South Columns)" },
        "Memory Shard": { v: 12000, l: "Enemy Runner Drops (PvP Hotspots)" },
        "Encrypted Data": { v: 10000, l: "Traxus Centers (Dire Marsh)" },
        "Unstable Core": { v: 7000, l: "UESC Security Bots (High-Sec)" },
        "Advanced Patch": { v: 4500, l: "NuCaloric Med-Crates (General)" },
        "Data Card": { v: 2500, l: "Terminals / Office Desks" }
    };

    const factionMissions = {
        "CyberAcme": ["Scan FTL Array (Radio Tower)", "Sabotage Comms Antenna (Relay Station)", "Extract 5 Data Cards"],
        "NuCaloric": ["Retrieve NuCal ID (Infested Columns)", "Activate DCON Rooftop Terminal", "Extract with 100% Oxygen"],
        "Traxus": ["Hack UESC Terminal (Dire Marsh)", "Scan 5 Traxus Containers", "Down 5 Runners with an SMG"],
        "Arachne": ["Deal 100 Damage to Runners", "Down an enemy Runner", "Extract a Memory Shard"],
        "MIDA": ["Smash 20 Glass Panels", "Defeat 15 UESC Units", "Extract 3 EMP Detonators"],
        "Sekiguchi": ["Inject Necrotic Sample (Flight Control)", "Scan your shell in SE orientation", "Extract a Bio-Core"]
    };

    let backpack = [];

    // Force Initialization
    function init() {
        // Build Weapons Dropdown
        const wSel = document.getElementById('weapon-select');
        wSel.innerHTML = ""; 
        Object.keys(weaponTable).sort().forEach(w => {
            let opt = document.createElement('option');
            opt.value = w; opt.text = w;
            wSel.add(opt);
        });

        // Initialize Contracts
        updateContracts();
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function runSync() {
        const shell = document.getElementById('shell-select').value;
        const weapon = document.getElementById('weapon-select').value;
        const type = weaponTable[weapon];
        let syn = 60;
        if(shell === "Vandal" && (type === "SMG" || type === "Shot")) syn = 95;
        if(shell === "Rook") syn = 100;
        document.getElementById('sync-status').innerText = syn + "% SYNC";
    }

    function addLoot() {
        const item = document.getElementById('loot-picker').value;
        if(!item) return;
        backpack.push({ n: item, ...lootData[item] });
        renderLoot();
    }

    function renderLoot() {
        const bpDiv = document.getElementById('backpack');
        let total = 0;
        bpDiv.innerHTML = "";
        backpack.forEach((item, i) => {
            total += item.v;
            bpDiv.innerHTML += `
                <div class="item-row">
                    <div><strong>${item.n}</strong><br><span class="loc-tag">LOC: ${item.l}</span></div>
                    <div style="display:flex; align-items:center;">
                        <span>${item.v}c</span>
                        <div class="del-btn" onclick="removeLoot(${i})">X</div>
                    </div>
                </div>`;
        });
        document.getElementById('total-val').innerText = total.toLocaleString() + " C";
    }

    function removeLoot(index) {
        backpack.splice(index, 1);
        renderLoot();
    }

    function updateContracts() {
        const f = document.getElementById('faction-select').value;
        const disp = document.getElementById('contract-display');
        disp.innerHTML = `<label class="label">ACTIVE OBJECTIVES: ${f}</label>`;
        factionMissions[f].forEach(obj => {
            disp.innerHTML += `
                <div class="obj-row">
                    <input type="checkbox" onchange="this.nextElementSibling.classList.toggle('completed')">
                    <span>${obj}</span>
                </div>`;
        });
    }

    // Run immediately and on load
    init();
    window.onload = init;
</script>
</body>
</html>
