<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Scanner Pro - High Stability</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { --primary: #1a5a30; --accent: #2e7d32; }
        body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 0 auto; padding: 10px; background: #f4f7f6; color: #333; }
        .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 1rem; }
        h1 { color: var(--primary); margin: 0 0 1rem 0; text-align: center; font-size: 1.5rem; }
        #camera-wrapper { width: 100%; background: #000; border-radius: 8px; overflow: hidden; position: relative; margin-bottom: 1rem; border: 2px solid #ddd; }
        video { width: 100%; display: block; }
        .cam-controls { display: flex; gap: 10px; margin-bottom: 1rem; }
        .btn { flex: 1; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        .btn-snap { background: var(--primary); }
        .btn-process { background: #007bff; width: 100%; margin-top: 10px; }
        .btn:disabled { background: #ccc; opacity: 0.6; }
        .progress-container { width: 100%; background: #eee; border-radius: 10px; height: 12px; margin: 1rem 0; display: none; overflow: hidden; }
        #progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
        #status { margin: 10px 0; padding: 10px; border-radius: 6px; font-size: 0.85rem; text-align: center; display: none; min-height: 40px; }
        #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 1rem; }
        .barcode-card { background: white; padding: 10px; border-radius: 8px; border: 1px solid #ddd; text-align: center; }
        .barcode-card svg { width: 100%; height: auto; }
        .stats-row { display: flex; justify-content: space-around; font-size: 0.85rem; margin-bottom: 10px; font-weight: bold; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>Stock Scanner Pro</h1>
    <div id="camera-wrapper"><video id="video" autoplay playsinline></video></div>
    <div class="stats-row">
        <div>Photos: <span id="q-count">0</span></div>
        <div>Unique UPCs: <span id="u-count">0</span></div>
    </div>
    <div class="cam-controls">
        <button class="btn btn-snap" id="snapBtn">📸 Snap Page</button>
        <button class="btn" style="background:#666" id="switchBtn">🔄 Switch</button>
    </div>
    <div class="progress-container" id="pBox"><div id="progress-bar"></div></div>
    <div id="status"></div>
    <button class="btn btn-process" id="processBtn" disabled>📄 Process All & Generate</button>
</div>

<div id="gallery"></div>
<canvas id="tempCanvas"></canvas>

<script>
    const video = document.getElementById('video');
    const snapBtn = document.getElementById('snapBtn');
    const processBtn = document.getElementById('processBtn');
    const qCount = document.getElementById('q-count');
    const uCount = document.getElementById('u-count');
    const progressBar = document.getElementById('progress-bar');
    const pBox = document.getElementById('pBox');
    const status = document.getElementById('status');
    const gallery = document.getElementById('gallery');

    let photoQueue = [];
    let currentFacingMode = "environment";

    navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode, width: { ideal: 1920 } } })
        .then(s => video.srcObject = s);

    document.getElementById('switchBtn').addEventListener('click', () => {
        currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
        navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode } }).then(s => video.srcObject = s);
    });

    snapBtn.addEventListener('click', () => {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        photoQueue.push(canvas.toDataURL('image/jpeg', 0.85));
        qCount.textContent = photoQueue.length;
        processBtn.disabled = false;
        video.style.opacity = 0.5; setTimeout(() => video.style.opacity = 1, 100);
    });

    processBtn.addEventListener('click', async () => {
        processBtn.disabled = snapBtn.disabled = true;
        pBox.style.display = 'block';
        gallery.innerHTML = "";
        const uniqueUpcs = new Set();

        for (let i = 0; i < photoQueue.length; i++) {
            updateStatus(`Analyzing Page ${i + 1} of ${photoQueue.length}...`, "#e3f2fd", "#0d47a1");
            
            // CRITICAL FIX: Create a fresh worker for every single page to avoid memory leaks
            const worker = await Tesseract.createWorker('eng');
            await worker.setParameters({ tessedit_char_whitelist: '0123456789' });
            
            const ret = await worker.recognize(photoQueue[i]);
            const matches = ret.data.text.match(/\d{7,13}/g) || [];
            matches.forEach(m => uniqueUpcs.add(m));
            
            await worker.terminate(); // Kill worker immediately after use
            
            // Small cooldown to let the UI thread breathe
            await new Promise(r => setTimeout(r, 200));

            progressBar.style.width = ((i + 1) / photoQueue.length) * 100 + "%";
            uCount.textContent = uniqueUpcs.size;
        }

        if (uniqueUpcs.size > 0) generateOutput([...uniqueUpcs]);
        updateStatus(`Finished! Found ${uniqueUpcs.size} unique codes.`, "#e8f5e9", "#1b5e20");
        
        photoQueue = [];
        qCount.textContent = "0";
        snapBtn.disabled = false;
    });

    function generateOutput(codes) {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF();
        let y = 20;
        codes.forEach(code => {
            let ean = code.padStart(12, '0').substring(0, 12);
            const card = document.createElement('div');
            card.className = 'barcode-card';
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            card.appendChild(svg);
            gallery.appendChild(card);
            try {
                JsBarcode(svg, ean, { format: "EAN13", width: 2, height: 40, displayValue: true });
                const canvas = document.getElementById('tempCanvas');
                JsBarcode(canvas, ean, { format: "EAN13", width: 2, height: 40 });
                if (y > 260) { pdf.addPage(); y = 20; }
                pdf.addImage(canvas.toDataURL(), 'PNG', 20, y, 50, 25);
                y += 35;
            } catch (e) {}
        });
        pdf.save("Scanned_Barcodes.pdf");
    }

    function updateStatus(msg, bg, color) {
        status.textContent = msg; status.style.display = 'block';
        status.style.background = bg; status.style.color = color;
    }
</script>
</body>
</html>
